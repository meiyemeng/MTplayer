name: Build MTPlayer Android (fish2018)

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: 1.3.4

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager --channel=3 "platforms;android-37.0" "build-tools;37.0.0"
      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mtplayer-release.jks"
          cat > android-fish2018/local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          storeFile=$RUNNER_TEMP/mtplayer-release.jks
          keyAlias=$ANDROID_KEY_ALIAS
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
      - name: Build four APK variants
        working-directory: android-fish2018
        run: |
          chmod +x gradlew
          ./gradlew \
            :app:assembleLeanbackArm64_v8aRelease \
            :app:assembleLeanbackArmeabi_v7aRelease \
            :app:assembleMobileArm64_v8aRelease \
            :app:assembleMobileArmeabi_v7aRelease \
            --no-daemon
      - name: Collect release files
        run: |
          mkdir -p artifacts/android
          cp android-fish2018/app/build/outputs/apk/leanbackArm64_v8a/release/leanback-arm64_v8a.apk artifacts/android/MTPlayer-Android-leanback-arm64_v8a.apk
          cp android-fish2018/app/build/outputs/apk/leanbackArmeabi_v7a/release/leanback-armeabi_v7a.apk artifacts/android/MTPlayer-Android-leanback-armeabi_v7a.apk
          cp android-fish2018/app/build/outputs/apk/mobileArm64_v8a/release/mobile-arm64_v8a.apk artifacts/android/MTPlayer-Android-mobile-arm64_v8a.apk
          cp android-fish2018/app/build/outputs/apk/mobileArmeabi_v7a/release/mobile-armeabi_v7a.apk artifacts/android/MTPlayer-Android-mobile-armeabi_v7a.apk
          sha256sum artifacts/android/*.apk > artifacts/android/SHA256SUMS-Android.txt
      - name: Generate update manifests
        run: python tools/generate_android_update_manifests.py --artifacts artifacts/android --output updates/android --version "${{ inputs.version }}" --code 26072301
      - uses: actions/upload-artifact@v4
        with:
          name: MTPlayer-Android-${{ inputs.version }}
          path: artifacts/android/*
          if-no-files-found: error
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v${{ inputs.version }}" >/dev/null 2>&1 || gh release create "v${{ inputs.version }}" --title "MT播放器 v${{ inputs.version }}" --notes "基于 fish2018 260720-16 的 MT播放器 Android 手机版与电视版。"
          gh release upload "v${{ inputs.version }}" artifacts/android/* --clobber
          gh release edit "v${{ inputs.version }}" --latest
      - name: Publish update manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/android/leanback.json updates/android/mobile.json
          git diff --cached --quiet || git commit -m "chore: publish Android ${{ inputs.version }} update manifests [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
