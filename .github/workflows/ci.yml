name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422
      - run: dotnet test tests/MTPlayer.Server.Tests/MTPlayer.Server.Tests.csproj -c Release

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422
      - run: dotnet test tests/MTPlayer.Client.Core.Tests/MTPlayer.Client.Core.Tests.csproj -c Release
      - run: dotnet build src/WebHtv.Desktop/WebHtv.Desktop.csproj -c Release -r win-x64 -p:Platform=x64

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - run: chmod +x android/gradlew
      - working-directory: android
        run: ./gradlew :core:test :mobile:assembleDebug :tv:assembleDebug :mobile:lintDebug :tv:lintDebug

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422
      - run: dotnet build src/MTPlayer.Mac/MTPlayer.Mac.csproj -c Release -r osx-x64 -warnaserror
